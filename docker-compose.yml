# ==============================================================================
# openschichtplaner5-api — lokaler Betrieb
#
#   1. DBF-Verzeichnis angeben:  SP5_DBF_DIR=/pfad/zu/SP5/Daten  (in .env oder
#      als Shell-Variable; ohne Angabe wird das Named Volume sp5_dbf genutzt)
#   2. .env anlegen (optional, aber SECRET_KEY für Produktion Pflicht):
#      SECRET_KEY=$(openssl rand -hex 32)
#   3. docker compose up --build
#
# Build-Arg LIB_SOURCE (Default: PyPI-Pin der Library) ist per .env
# überschreibbar, z. B. auf git+https://…@main.
# ==============================================================================
services:
  api:
    build:
      context: .
      args:
        LIB_SOURCE: ${LIB_SOURCE:-libopenschichtplaner5[postgres]==1.20.0}
    image: openschichtplaner5-api:latest
    ports:
      - "8000:8000"
    volumes:
      # DBF-Daten: Host-Pfad via SP5_DBF_DIR, sonst Named Volume
      - ${SP5_DBF_DIR:-sp5_dbf}:/app/data
      # Mutabler Laufzeit-State (JSON-Stores, Uploads, Auto-Migrate-Backups)
      - api_state:/app/backend/data
      - api_api_state:/app/backend/api
      - api_backups:/app/backend/backups
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

volumes:
  sp5_dbf:
  api_state:
  api_api_state:
  api_backups:
