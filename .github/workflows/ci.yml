name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest --cov=sp5api --cov-fail-under=70 -q

  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Nur die Laufzeit-Abhängigkeiten auditieren (keine dev-Extras);
      # pip zuerst aktualisieren, damit nicht das gebündelte pip gemeldet wird.
      - name: Install package + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install . pip-audit

      - name: Audit Python dependencies (pip-audit)
        run: pip-audit
